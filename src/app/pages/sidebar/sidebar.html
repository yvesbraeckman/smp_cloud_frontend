<!-- Sidebar navigation — rendered on every authenticated page -->

<nav class="sidebar">
  <!-- ══ Logo / brand ══ -->
  <a [routerLink]="['/fleet-overview']" class="logo-area">
    <svg
      width="24"
      height="24"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2.5"
      stroke-linecap="round"
      stroke-linejoin="round"
      style="margin-right: 12px; color: #0a84ff"
    >
      <rect x="3" y="3" width="18" height="18" rx="4" ry="4"></rect>
      <path d="M9 3v18"></path>
    </svg>
    <span>SPW ADMIN</span>
  </a>

  <!-- ══ Primary navigation ══ -->
  <div class="nav-links">
    <a
      [routerLink]="['/fleet-overview']"
      [class.active]="router.url.includes('/fleet-overview') || router.url.includes('/walls')"
    >
      Locatie-overzicht
    </a>

    <a [routerLink]="['/residents']" [class.active]="router.url.includes('/residents')">
      Bewonersbeheer
    </a>

    <a [routerLink]="['/logs']" [class.active]="router.url.includes('/logs')"> Logboek & Audit </a>

    <a [routerLink]="['/settings']" [class.active]="router.url.includes('/settings')">
      Instellingen
    </a>
  </div>

  <!-- ══ Logout ══ -->
  <div class="nav-footer">
    <a href="#" (click)="$event.preventDefault(); promptLogout()" class="logout-link">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        height="20px"
        viewBox="0 -960 960 960"
        width="20px"
        fill="currentColor"
        style="margin-right: 10px"
      >
        <path
          d="M200-120q-33 0-56.5-23.5T120-200v-560q0-33 23.5-56.5T200-840h280v80H200v560h280v80H200Zm440-160-55-58 102-102H360v-80h327L585-622l55-58 200 200-200 200Z"
        />
      </svg>
      Uitloggen
    </a>
  </div>
</nav>

<!-- ══ Logout confirmation modal ══ -->
@if (showLogoutModal) {
  <div class="modal-overlay" (click)="cancelLogout()">
    <div class="modal-box" (click)="$event.stopPropagation()">
      <div class="modal-icon">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          height="28px"
          viewBox="0 -960 960 960"
          width="28px"
          fill="currentColor"
        >
          <path
            d="M200-120q-33 0-56.5-23.5T120-200v-560q0-33 23.5-56.5T200-840h280v80H200v560h280v80H200Zm440-160-55-58 102-102H360v-80h327L585-622l55-58 200 200-200 200Z"
          />
        </svg>
      </div>

      <h3>Uitloggen</h3>
      <p>Weet je zeker dat je wilt uitloggen? Je sessie wordt veilig afgesloten.</p>

      <div class="modal-actions">
        <button class="btn-cancel" (click)="cancelLogout()">Blijven</button>
        <button class="btn-danger" (click)="confirmLogout()">Uitloggen</button>
      </div>
    </div>
  </div>
}
