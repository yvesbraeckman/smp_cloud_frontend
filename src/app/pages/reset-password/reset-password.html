<main class="reset-wrapper">
    <div class="reset-container">
        
        <header class="page-header">
            <div class="logo-circle">
                <img src="/image1.png" alt="Smart Parcel Wall Logo">
            </div>
            <h1>Nieuw Wachtwoord</h1>
            <p class="subtitle">Zorg ervoor dat het minimaal 6 tekens lang is.</p>
        </header>

        @if (errorMessage) {
            <div class="status-banner error">
                <svg xmlns="http://www.w3.org/2000/svg" height="18px" viewBox="0 -960 960 960" width="18px" fill="currentColor"><path d="M480-280q17 0 28.5-11.5T520-320q0-17-11.5-28.5T480-360q-17 0-28.5 11.5T440-320q0 17 11.5 28.5T480-280Zm-40-160h80v-240h-80v240Zm40 360q-83 0-156-31.5T197-197q-54-54-85.5-127T80-480q0-83 31.5-156T197-763q54-54 127-85.5T480-880q83 0 156 31.5T763-763q54 54 85.5 127T880-480q0 83-31.5 156T763-197q-54 54-127 85.5T480-80Zm0-80q134 0 227-93t93-227q0-134-93-227t-227-93q-134 0-227 93t-93 227q0 134 93 227t227 93Zm0-320Z"/></svg>
                <span>{{ errorMessage }}</span>
            </div>
        }

        @if (successMessage) {
            <div class="status-banner success">
                <svg xmlns="http://www.w3.org/2000/svg" height="18px" viewBox="0 -960 960 960" width="18px" fill="currentColor"><path d="M382-240 154-468l57-57 171 171 367-367 57 57-424 424Z"/></svg>
                <span>{{ successMessage }}</span>
            </div>
        }

        @if (token && !successMessage) {
            <form (ngSubmit)="onSubmit()" class="reset-form">
                
                <div class="settings-box">
                    
                    <div class="settings-row">
                        <label for="newPassword">Nieuw wachtwoord</label>
                        <div class="input-wrapper">
                            <input 
                                [type]="isPasswordVisible ? 'text' : 'password'" 
                                id="newPassword"
                                name="newPassword"
                                [(ngModel)]="newPassword"
                                placeholder="Minimaal 6 tekens"
                                required>
                            <button type="button" class="password-toggle" (click)="togglePasswordVisibility()" [title]="isPasswordVisible ? 'Verberg' : 'Toon'">
                                @if (isPasswordVisible) {
                                    <svg xmlns="http://www.w3.org/2000/svg" height="18px" viewBox="0 -960 960 960" width="18px" fill="currentColor"><path d="m644-428-58-58q9-47-27-88t-93-32l-58-58q17-8 34.5-12t37.5-4q75 0 127.5 52.5T660-500q0 20-4 37.5T644-428Zm128 126-58-56q38-29 67.5-63.5T832-500q-50-101-143.5-160.5T480-720q-29 0-57 4t-55 12l-62-62q41-17 84-25.5t90-8.5q151 0 269 83.5T928-500q-23 59-60.5 109.5T772-302Zm-20 236L590-228q-26 11-54 15.5T480-208q-151 0-269-83.5T16-500q21-53 53-98.5t73-81.5L56-764l56-56 716 716-56 56ZM222-624q-29 26-53 57t-41 67q50 101 143.5 160.5T480-280q20 0 39-2.5t39-5.5l-36-38q-11 3-21 4.5t-21 1.5q-75 0-127.5-52.5T300-500q0-11 1.5-21t4.5-21l-84-82Zm319 93Zm-151 75Z"/></svg>
                                } @else {
                                    <svg xmlns="http://www.w3.org/2000/svg" height="18px" viewBox="0 -960 960 960" width="18px" fill="currentColor"><path d="M480-320q75 0 127.5-52.5T660-500q0-75-52.5-127.5T480-680q-75 0-127.5 52.5T300-500q0 75 52.5 127.5T480-320Zm0-80q-42 0-71-29t-29-71q0-42 29-71t71-29q42 0 71 29t29 71q0 42-29 71t-71 29Zm0 160q-134 0-233-77T112-500q36-108 135-185t233-77q134 0 233 77t135 185q-36 108-135 185t-233 77Z"/></svg>
                                }
                            </button>
                        </div>
                    </div>

                    <div class="settings-row">
                        <label for="confirmPassword">Bevestig</label>
                        <div class="input-wrapper">
                            <input 
                                type="password" 
                                id="confirmPassword"
                                name="confirmPassword"
                                [(ngModel)]="confirmPassword"
                                placeholder="••••••••"
                                required>
                        </div>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-primary" [disabled]="isLoading">
                        {{ isLoading ? 'Bezig...' : 'Wachtwoord instellen' }}
                    </button>
                </div>
            </form>
        }

        <footer class="reset-footer">
            <a href="/login" class="back-link">
                <svg xmlns="http://www.w3.org/2000/svg" height="16px" viewBox="0 -960 960 960" width="16px" fill="currentColor"><path d="m313-440 224 224-57 56-320-320 320-320 57 56-224 224h487v80H313Z"/></svg>
                Terug naar inloggen
            </a>
            <div class="copy-info">&copy; 2026 Smart Parcel Wall System</div>
        </footer>
    </div>
</main>
